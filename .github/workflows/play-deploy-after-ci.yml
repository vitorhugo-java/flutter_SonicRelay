name: Trigger Play Deploy After CI/CD

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  trigger-play-deploy:
    name: Trigger Android Play Deploy
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Trigger Android Play Deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run android-play-deploy.yml --ref main
