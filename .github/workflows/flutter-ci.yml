name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

  build-android:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --build-number "${{ github.run_number }}"

      - name: Build release AAB
        run: flutter build appbundle --release --build-number "${{ github.run_number }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-relay-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-relay-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [analyze, test, build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//' | cut -d'+' -f1)
          TAG="v${VERSION_NAME}+${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: sonic-relay-apk
          path: dist

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: sonic-relay-aab
          path: dist

      - name: Rename release artifacts
        run: |
          mv dist/app-release.apk "dist/sonic-relay-${{ steps.version.outputs.tag }}.apk"
          mv dist/app-release.aab "dist/sonic-relay-${{ steps.version.outputs.tag }}.aab"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            dist/sonic-relay-${{ steps.version.outputs.tag }}.apk
            dist/sonic-relay-${{ steps.version.outputs.tag }}.aab
          generate_release_notes: true
