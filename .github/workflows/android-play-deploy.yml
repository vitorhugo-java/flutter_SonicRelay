name: Android Play Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.1"
  ANDROID_PACKAGE_NAME: "com.vitorhugo.sonicrelay.sonic_relay"
  PLAY_TRACK: "internal"

jobs:
  deploy-google-play:
    name: Deploy signed AAB to Google Play internal testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate deployment secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            PLAY_SERVICE_ACCOUNT_JSON; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required repository secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Create Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Create Google Play service account file
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Build signed Android App Bundle
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: flutter build appbundle --release --build-number "$BUILD_NUMBER"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-relay-play-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Install Fastlane
        run: gem install fastlane

      - name: Upload to Google Play internal testing
        run: |
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --track "$PLAY_TRACK" \
            --release_status completed \
            --json_key play-service-account.json \
            --package_name "$ANDROID_PACKAGE_NAME" \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --skip_upload_changelogs true
